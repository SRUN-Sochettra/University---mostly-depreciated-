<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="output.css">
    <title>Tailwind</title>
</head>

<body>

    <div class="max-w-sm rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-xl bg-purple-600"></div>
            <div>
                <h3 class="font-semibold text-gray-900">Tailwind Card</h3>
                <p class="text-sm text-gray-500">Fast and consistent UI</p>
            </div>
        </div>

        <p class="mt-4 text-gray-600">
            This is a simple component built from utilities.
        </p>

        <button class="mt-6 w-full rounded-xl bg-purple-600 px-4 py-2 font-medium text-white
                 hover:bg-purple-700 focus:outline-none focus:ring-4 focus:ring-purple-300">
            Get Started
        </button>
    </div>
    <br><br><br><br><br><br>

    <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
        <h2 class="text-xl font-semibold text-gray-900">Card title</h2>
        <p class="mt-2 text-gray-600">This is a simple Tailwind card.</p>
        <button class="mt-4 px-4 py-2 rounded-lg bg-purple-600 text-white hover:bg-purple-700">
            Button
        </button>
    </div>
    <br><br><br><br><br><br>

    <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow">
        <div class="font-bold text-gray-900">Logo</div>
        <div class="flex gap-4 text-gray-700">
            <a class="hover:text-purple-600" href="#">Home</a>
            <a class="hover:text-purple-600" href="#">About</a>
            <a class="hover:text-purple-600" href="#">Contact</a>
        </div>
    </div>
    <br><br><br><br><br><br>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl shadow">Card 1</div>
        <div class="bg-white p-6 rounded-xl shadow">Card 2</div>
        <div class="bg-white p-6 rounded-xl shadow">Card 3</div>
    </div>
    <br><br><br><br><br><br>

    <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-gray-900">
        Headline
    </h1>
    <p class="mt-3 text-gray-600 leading-relaxed max-w-prose">
        Good typography makes your UI feel professional.
    </p>
    <br><br><br><br><br><br>

    <button class="px-4 py-2 rounded-lg bg-purple-600 text-white
               hover:bg-purple-700
               focus:outline-none focus:ring-4 focus:ring-purple-300">
        Accessible Button
    </button>
    <br><br><br><br><br><br>

    <button class="bg-blue-500 transition 
               hover:bg-blue-600 
               focus:ring-4 focus:ring-blue-300 
               active:scale-95 rounded-xl px-4 py-2 text-white">
        Click Me
    </button>
    <br><br><br><br><br><br>

</body>

</html>
